<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bit-Bot 🤖</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#374151">
    <style>
        :root { --case: #d1d5db; --screen-bg: #9ca3af; --pixel-on: #1f2937; --pixel-off: #6b7280; --accent: #3b82f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; user-select: none; }
        body { 
            background: #e5e7eb; display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px;
        }
        
        .shell {
            background: var(--case); border-radius: 20px 20px 60px 20px; padding: 30px;
            box-shadow: -8px 8px 0 #9ca3af, 0 15px 30px rgba(0,0,0,0.1); 
            width: 340px; max-width: 100%; display: flex; flex-direction: column; align-items: center;
        }

        .screen-bezel {
            background: #374151; padding: 25px 30px; border-radius: 15px 15px 45px 15px; 
            width: 100%; margin-bottom: 30px; box-shadow: inset 2px 2px 8px rgba(0,0,0,0.4);
            position: relative;
        }
        .power-led {
            position: absolute; top: 15px; left: 15px; width: 8px; height: 8px; 
            background: #ef4444; border-radius: 50%; box-shadow: 0 0 5px #ef4444;
        }

        .screen {
            background: var(--screen-bg); border: 2px solid #1f2937; height: 240px; position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: inset 3px 3px 8px rgba(0,0,0,0.2); overflow: hidden;
        }

        /* Pixel Art Bot */
        .bot {
            width: 64px; height: 64px; background: var(--pixel-on); 
            position: relative; transition: all 0.3s;
            clip-path: polygon(20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%, 0% 20%);
        }
        .face {
            position: absolute; top: 16px; left: 12px; width: 40px; height: 32px;
        }
        .eye {
            width: 8px; height: 8px; background: var(--screen-bg); position: absolute; top: 0;
            animation: blink 4s infinite;
        }
        .eye.left { left: 4px; } .eye.right { right: 4px; }
        .mouth {
            width: 16px; height: 4px; background: var(--screen-bg); position: absolute; bottom: 4px; left: 12px;
        }

        /* Animations */
        @keyframes blink { 0%, 96%, 100% { transform: scaleY(1); } 98% { transform: scaleY(0.1); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } }
        
        .bot.happy { animation: bounce 0.6s infinite; }
        .bot.sad { animation: shake 3s infinite; }
        .bot.sleeping { opacity: 0.7; transform: scale(0.9); }
        .bot.sleeping .eye { height: 2px; top: 3px; animation: none; }

        /* Speech Bubble */
        .bubble {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--pixel-on); color: var(--screen-bg);
            padding: 4px 8px; font-size: 0.7rem; font-weight: bold; white-space: nowrap;
            opacity: 0; transition: opacity 0.2s; pointer-events: none;
            border: 2px solid var(--pixel-off);
        }
        .bubble.show { opacity: 1; }
        .bubble::after {
            content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
            border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 6px solid var(--pixel-on);
        }

        /* Stats */
        .stats-overlay {
            position: absolute; bottom: 10px; left: 10px; right: 10px; display: flex; flex-direction: column; gap: 4px;
        }
        .stat-row { display: flex; align-items: center; gap: 6px; font-size: 0.6rem; color: var(--pixel-on); font-weight: 900; }
        .stat-track { flex: 1; height: 6px; background: var(--pixel-off); border: 1px solid var(--pixel-on); }
        .stat-fill { height: 100%; background: var(--pixel-on); width: 100%; }

        /* Controls */
        .brand { margin-top: 15px; font-size: 0.9rem; color: #4b5563; font-weight: 900; letter-spacing: 2px; font-style: italic; }
        
        .controls-area { width: 100%; display: flex; justify-content: space-around; align-items: center; padding: 0 10px; }
        .d-pad {
            width: 90px; height: 90px; position: relative;
        }
        .d-btn {
            position: absolute; background: #1f2937; border: none; cursor: pointer;
            width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1rem;
        }
        .d-btn:active { background: #4b5563; }
        .d-up { top: 0; left: 30px; border-radius: 4px 4px 0 0; }
        .d-down { bottom: 0; left: 30px; border-radius: 0 0 4px 4px; }
        .d-left { top: 30px; left: 0; border-radius: 4px 0 0 4px; }
        .d-right { top: 30px; right: 0; border-radius: 0 4px 4px 0; }
        .d-center { top: 30px; left: 30px; background: #1f2937; }

        .action-btns { display: flex; gap: 15px; }
        .a-btn {
            width: 45px; height: 45px; border-radius: 50%; border: none; 
            background: #991b1b; color: white; font-weight: 900; font-size: 0.8rem;
            box-shadow: 0 3px 0 #7f1d1d; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .a-btn:active { transform: translateY(3px); box-shadow: none; }
        .b-btn { background: #1e40af; box-shadow: 0 3px 0 #1e3a8a; }

    </style>
</head>
<body>
    <div class="shell">
        <div class="screen-bezel">
            <div class="power-led"></div>
            <div class="screen">
                <div class="bubble" id="bubble">Hi!</div>
                <div class="bot" id="bot">
                    <div class="face">
                        <div class="eye left"></div>
                        <div class="eye right"></div>
                        <div class="mouth"></div>
                    </div>
                </div>
                <div class="stats-overlay">
                    <div class="stat-row">PWR <div class="stat-track"><div class="stat-fill" id="hBar"></div></div></div>
                    <div class="stat-row">BAT <div class="stat-track"><div class="stat-fill" id="eBar"></div></div></div>
                    <div class="stat-row">FUN <div class="stat-track"><div class="stat-fill" id="fBar"></div></div></div>
                </div>
            </div>
        </div>

        <div class="controls-area">
            <div class="d-pad">
                <button class="d-btn d-up" onclick="bitbot.interact('up')">▲</button>
                <button class="d-btn d-left" onclick="bitbot.interact('left')">◀</button>
                <button class="d-btn d-center"></button>
                <button class="d-btn d-right" onclick="bitbot.interact('right')">▶</button>
                <button class="d-btn d-down" onclick="bitbot.toggleSleep()">▼</button>
            </div>
            <div class="action-btns">
                <button class="a-btn" onclick="bitbot.feed()">A</button>
                <button class="a-btn b-btn" onclick="bitbot.play()">B</button>
            </div>
        </div>

        <div class="brand">NINTENDO BIT-BOT</div>
    </div>

    <script>
        const bitbot = {
            stats: { hunger: 100, energy: 100, joy: 100, lastLogin: Date.now() },
            state: 'idle',
            
            init() {
                this.load();
                this.calcOffline();
                this.loop = setInterval(() => this.tick(), 4000);
                this.updateUI();
            },

            tick() {
                if (this.state === 'sleeping') {
                    this.stats.energy = Math.min(100, this.stats.energy + 5);
                    this.stats.hunger = Math.max(0, this.stats.hunger - 0.5);
                } else {
                    this.stats.hunger = Math.max(0, this.stats.hunger - 1);
                    this.stats.energy = Math.max(0, this.stats.energy - 0.5);
                    this.stats.joy = Math.max(0, this.stats.joy - 1.5);
                }
                this.save();
                this.updateUI();
            },

            feed() {
                if (this.state === 'sleeping') return this.wake();
                if (this.stats.hunger > 90) return this.say("Full!");
                this.stats.hunger = Math.min(100, this.stats.hunger + 20);
                this.anim('happy'); this.say("Yum!");
                this.updateUI();
            },

            play() {
                if (this.state === 'sleeping') return this.wake();
                if (this.stats.energy < 15) return this.say("Tired...");
                this.stats.joy = Math.min(100, this.stats.joy + 15);
                this.stats.energy -= 10;
                this.anim('happy'); this.say("FUN!");
                this.updateUI();
            },

            interact(dir) {
                if (this.state === 'sleeping') return this.wake();
                // Simple petting logic
                this.stats.joy = Math.min(100, this.stats.joy + 5);
                this.say("Hehe!");
                this.updateUI();
            },

            toggleSleep() {
                if (this.state === 'sleeping') this.wake();
                else {
                    this.state = 'sleeping';
                    this.say("Zzz...");
                    document.getElementById('bot').classList.add('sleeping');
                }
            },

            wake() {
                this.state = 'idle';
                this.say("Boot!");
                document.getElementById('bot').classList.remove('sleeping');
            },

            anim(cls) {
                const el = document.getElementById('bot');
                el.classList.remove(cls);
                void el.offsetWidth; // Trigger reflow
                el.classList.add(cls);
                setTimeout(() => el.classList.remove(cls), 1500);
            },

            say(text) {
                const b = document.getElementById('bubble');
                b.textContent = text;
                b.classList.add('show');
                setTimeout(() => b.classList.remove('show'), 1500);
            },

            updateUI() {
                document.getElementById('hBar').style.width = this.stats.hunger + '%';
                document.getElementById('eBar').style.width = this.stats.energy + '%';
                document.getElementById('fBar').style.width = this.stats.joy + '%';
                
                const el = document.getElementById('bot');
                if (this.stats.hunger < 30 || this.stats.joy < 30) el.classList.add('sad');
                else el.classList.remove('sad');
            },

            calcOffline() {
                const hours = (Date.now() - this.stats.lastLogin) / 3.6e6;
                if (hours > 0.1) {
                    this.stats.hunger = Math.max(0, this.stats.hunger - (hours * 5));
                    this.stats.joy = Math.max(0, this.stats.joy - (hours * 10));
                    this.say("Missed u!");
                }
            },

            save() { this.stats.lastLogin = Date.now(); localStorage.setItem('bitbot_save', JSON.stringify(this.stats)); },
            load() { 
                const s = localStorage.getItem('bitbot_save');
                if (s) this.stats = { ...this.stats, ...JSON.parse(s) };
            }
        };
        window.bitbot = bitbot;
        bitbot.init();
    </script>
</body>
</html>
